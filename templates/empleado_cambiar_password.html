{% extends "base_empleado.html" %}

{% block content %}
<h1 style="font-size:1.5rem; color:#111; margin-bottom:20px;">Cambiar contraseña</h1>
<p style="color:#6b7280; margin-bottom:24px;">Use la contraseña inicial que le dieron (Colbeef2026*) la primera vez; luego podrá usar la nueva.</p>

<form method="POST" action="{{ url_for('empleado_cambiar_password') }}" class="detail-card" style="max-width:420px;">
    <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Contraseña actual <span class="required">*</span></label>
            <input type="password" name="password_actual" class="form-input" required placeholder="Ej. Colbeef2026*" autocomplete="current-password">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nueva contraseña <span class="required">*</span></label>
            <input type="password" name="nueva_password" class="form-input" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Repetir nueva contraseña <span class="required">*</span></label>
            <input type="password" name="repetir_password" class="form-input" required minlength="6" placeholder="Repita la nueva contraseña" autocomplete="new-password">
        </div>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Guardar nueva contraseña</button>
        <a href="{{ url_for('empleado_portal') }}" class="btn btn-outline">Cancelar</a>
    </div>
</form>
{% endblock %}
